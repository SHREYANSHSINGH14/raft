syntax = "proto3";

package raft.rpc;

option go_package = "github.com/SHREYANSHSINGH14/raft/types";

import "log.proto";

// ─────────────────────────────────────────────
//  Service definition
// ─────────────────────────────────────────────

// RaftRpc defines the RPC methods for Raft communication.
service RaftRpc {
    // RequestVote is called by candidates to gather votes from followers.
    rpc RequestVote (RequestVoteArgs) returns (RequestVoteResponse);
    // AppendEntries is called by leaders to replicate log entries and as heartbeats.
    rpc AppendEntries (AppendEntriesArgs) returns (AppendEntriesResponse);
}

// ─────────────────────────────────────────────
//  RPC messages
// ─────────────────────────────────────────────

// RequestVoteArgs is the message sent by candidates to solicit votes.
message RequestVoteArgs {
  uint64 term = 1; // candidate’s term
  string candidate_id = 2; // candidate requesting vote
  uint64 last_log_index = 3; // index of candidate’s last log entry
  uint64 last_log_term = 4; // term of candidate’s last log entry
}

message RequestVoteResponse {
  uint64 term = 1; // current term
  bool vote_granted = 2; // whether vote was granted
}

// AppendEntriesArgs is the message sent by leaders to replicate log entries and as heartbeats.
message AppendEntriesArgs {
  uint64 term = 1; // leader’s term
  string leader_id = 2; // so followers can redirect clients
  uint64 prev_log_index = 3; // index of log entry immediately preceding new ones
  uint64 prev_log_term = 4; // term of prev_log_index entry
  repeated raft.log.LogEntry entries = 5; // log entries to store (empty for heartbeat; may send more than one for efficiency)
  uint64 leader_commit = 6; // leader’s commit index
}

message AppendEntriesResponse {
  uint64 term = 1; // current term
  bool success = 2; // true if follower contained entry matching prev_log_index and prev_log_term
}

